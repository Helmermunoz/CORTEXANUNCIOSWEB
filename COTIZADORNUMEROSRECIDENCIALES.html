<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Interactivo - Cortex</title>
    <style>
        :root {
            --rosseta-red: #c0392b;
            --dark-gray: #333;
            --light-bg: #f9f9f9;
            --whatsapp-green: #25d366;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #eee;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .cotizador-card {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; /* Para posicionar la imagen */
            overflow: hidden;
        }

        /* Estilo de la previsualización */
        .preview-box {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 10px;
            border: 2px solid #eee;
            background-size: cover;
            background-position: center;
            background-color: #fff;
            transition: 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: left; /* Alineado a la izquierda para dejar espacio a la foto */
            color: var(--dark-gray);
            margin-bottom: 5px;
            padding-right: 90px;
        }

        p.subtitle {
            text-align: left;
            font-size: 0.9em;
            color: #777;
            margin-bottom: 25px;
            padding-right: 90px;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 7px; color: #444; }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--rosseta-red); }

        .total-container {
            background: var(--dark-gray);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 25px;
        }

        .total-label { font-size: 0.8em; text-transform: uppercase; display: block; }
        .price { font-size: 2.2em; font-weight: bold; color: #fff; }

        .btn-whatsapp {
            display: block;
            width: 100%;
            background: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .btn-whatsapp:hover { background: #128c7e; transform: translateY(-2px); }
        .note { font-size: 0.75em; color: #999; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="cotizador-card">
    <!-- Contenedor de la imagen de previsualización -->
    <div id="img-preview" class="preview-box"></div>

    <h2>Cotizador Cortex</h2>
    <p class="subtitle">Personaliza tu placa domiciliaria</p>
    
    <div class="form-group">
        <label>Dirección o Números a fabricar:</label>
        <input type="text" id="direccion" placeholder="Ej. Juárez #123" oninput="calcular()">
    </div>

    <div class="form-group">
        <label>Tipo de Producto:</label>
        <!-- Importante: el valor ahora es el ID del producto para el JS -->
        <select id="producto" onchange="calcular()">
            <optgroup label="Números 3D (20 cm)">
                <option value="negro3d" data-precio="380">Negro Mate 3D</option>
                <option value="brillante3d" data-precio="380">Negro brillante 3D</option>
                <option value="dorado3d" data-precio="380">Dorado Espejo Premium 3D</option>
                <option value="plata3d" data-precio="300">Plata 3D</option>
                <option value="espejo3d" data-precio="380">Números plata espejo</option>
            </optgroup>
            <optgroup label="Placas y Planos">
                <option value="plano_plata" data-precio="100">Número Plano plata</option>
                <option value="placa_moderna" data-precio="500">Placa Moderna (Chapetones)</option>
            </optgroup>
        </select>
    </div>

    <div class="form-group">
        <label>Cantidad de dígitos/piezas:</label>
        <input type="number" id="cantidad" value="1" min="1" oninput="calcular()">
    </div>

    <div class="form-group">
        <label>Tamaño:</label>
        <select id="tamano" onchange="calcular()">
            <option value="1">Estándar (20 cm)</option>
            <option value="1.5">Grande (30 cm) +50%</option>
            <option value="0.7">Pequeño (15 cm) -30%</option>
        </select>
    </div>

    <div class="total-container">
        <span class="total-label">Inversión Estimada</span>
        <span class="price" id="total">$0.00</span>
    </div>

    <button onclick="enviarWhatsApp()" class="btn-whatsapp">
        Enviar pedido por WhatsApp
    </button>
    
    <p class="note">*Los precios son estimaciones y pueden variar según el diseño final.</p>
</div>

<script>
// 1. MAPE DE IMÁGENES: Cambia estas URLs por las fotos reales de tus trabajos
const catalogoImagenes = {
    "negro3d": "numero3DcotizadorNegromate.jpg",
    "brillante3d": "numero3DcotizadorNEGROBRILLANTE.jpg",
    "dorado3d": "numero3DcotizadorDORADOESPEJO.jpg",
    "plata3d": "NUMERO3D2.jpg",
    "espejo3d": "numero3DcotizadorPLATAESPEJO.jpg",
    "plano_plata": "NUMEROPLANO1.jpg",
    "placa_moderna": "NUMERODOMICILIARIO2ia.jpg"
};

function calcular() {
    const selectProducto = document.getElementById('producto');
    const opcionSeleccionada = selectProducto.options[selectProducto.selectedIndex];
    
    // Obtener precio desde el atributo data-precio
    const precioBase = parseFloat(opcionSeleccionada.getAttribute('data-precio'));
    const cantidad = parseInt(document.getElementById('cantidad').value) || 0;
    const factorTamano = parseFloat(document.getElementById('tamano').value);
    
    // Actualizar Imagen
    const idProducto = selectProducto.value;
    const imgPreview = document.getElementById('img-preview');
    if(catalogoImagenes[idProducto]) {
        imgPreview.style.backgroundImage = `url('${catalogoImagenes[idProducto]}')`;
    }

    let subtotal = (precioBase * cantidad) * factorTamano;

    document.getElementById('total').innerText = '$' + subtotal.toLocaleString('es-MX', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });

    return subtotal;
}

function enviarWhatsApp() {
    const totalEstimado = document.getElementById('total').innerText;
    const direccionText = document.getElementById('direccion').value || "No especificada";
    const productoNombre = document.getElementById('producto').options[document.getElementById('producto').selectedIndex].text;
    const cantidad = document.getElementById('cantidad').value;
    const tamanoNombre = document.getElementById('tamano').options[document.getElementById('tamano').selectedIndex].text;
    
    const telefono = "526681490233"; 

    const mensaje = `¡Hola Cortex Anuncios! 👋\n\n` +
                    `Me interesa una cotización:\n` +
                    `📍 *Dirección:* ${direccionText}\n` +
                    `🔹 *Producto:* ${productoNombre}\n` +
                    `🔹 *Cantidad:* ${cantidad} pieza(s)\n` +
                    `🔹 *Tamaño:* ${tamanoNombre}\n` +
                    `💰 *Total estimado:* ${totalEstimado}\n\n` +
                    `¿Me podrían dar más información?`;

    window.open(`https://api.whatsapp.com/send?phone=${telefono}&text=${encodeURIComponent(mensaje)}`, '_blank');
}

window.onload = calcular;
</script>

</body>
</html>
