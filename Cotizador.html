<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Inteligente | CORTEX ANUNCIOS</title>
    <style>
        :root {
            --azul-oscuro: #001a3d;
            --azul-cortex: #003067;
            --naranja: #e67e22;
            --gris-fondo: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--gris-fondo); color: #333; line-height: 1.6; }

        header {
            background: linear-gradient(to right, var(--azul-cortex), var(--azul-oscuro));
            padding: 15px 0;
            text-align: center;
            border-bottom: 4px solid var(--naranja);
        }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; }

        .card-cotizador {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: var(--azul-oscuro); text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; }

        .step-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0 15px 0;
            color: var(--azul-cortex);
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--naranja); outline: none; box-shadow: 0 0 5px rgba(230, 126, 34, 0.2); }

        .btn-enviar {
            background: var(--naranja);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-enviar:hover { background: var(--azul-oscuro); transform: translateY(-2px); }

        footer { text-align: center; margin-top: 40px; padding: 20px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="CORTEXLOGO.jpg" alt="Cortex Anuncios" style="height: 70px;">
        </a>
    </header>

    <div class="container">
        <div class="card-cotizador">
            <h1>Cotizador de Proyectos</h1>
            <p class="subtitle">Recibe una Cotizacion personalizado para tu negocio en minutos.</p>

            <form id="cotizador-form">
                
                <div class="step-title"><span>1.</span> Datos del Cliente</div>
                <div class="form-grid">
                    <div>
                        <label>Nombre Completo *</label>
                        <input type="text" id="nombre" placeholder="Nombre y Apellido" required>
                    </div>
                    <div>
                        <label>WhatsApp / Teléfono *</label>
                        <input type="tel" id="whatsapp" placeholder="668 000 0000" required>
                    </div>
                </div>

                <div class="step-title"><span>2.</span> Detalles del Anuncio</div>
                <div class="form-grid">
                    <div>
                        <label>Tipo de Letrero</label>
                        <select id="tipo">
                            <option value="Letras 3D con Luz">Letras 3D con Luz</option>
                            <option value="Letras 3D sin Luz">Letras 3D sin Luz (MDF/PVC)</option>
                            <option value="Caja de Luz (Acrílico)">Caja de Luz (Acrílico)</option>
                            <option value="Letrero Neón Flex">Letrero Neón Flex</option>
                            <option value="Lona Publicitaria">Lona Publicitaria</option>
                            <option value="Vinil de Corte/Impresión">Vinil de Corte o Impresión</option>
                            <option value="Números Residenciales 3D">Números Residenciales 3D</option>
                        </select>
                    </div>
                    <div>
                        <label>Medidas (Aprox. en cm o m)</label>
                        <input type="text" id="medidas" placeholder="Ej: 2 metros x 80 cm">
                    </div>
                </div>

                <div class="step-title"><span>3.</span> Instalación</div>
                <div class="form-grid">
                    <div>
                        <label>¿Requiere Instalación?</label>
                        <select id="instalacion">
                            <option value="Sí, requiere instalación">Sí, en Los Mochis o alrededores</option>
                            <option value="No, solo fabricación">No, yo paso por él / Solo envío</option>
                        </select>
                    </div>
                    <div>
                        <label>Superficie de montaje</label>
                        <select id="superficie">
                            <option value="Pared Lisa">Pared Lisa (Concreto/Ladrillo)</option>
                            <option value="Tablaroca">Tablaroca / Panel</option>
                            <option value="Vidrio">Vidrio / Cristal</option>
                            <option value="Metal/Fachada">Metal o Fachada de Alucobond</option>
                            <option value="Otro">Otro / No estoy seguro</option>
                        </select>
                    </div>
                </div>

                <div class="step-title"><span>4.</span> Información Adicional</div>
                <label>Descripción de tu idea</label>
                <textarea id="descripcion" rows="4" placeholder="Cuéntanos más sobre los colores, si tienes el diseño listo o cualquier duda técnica..."></textarea>

                <button type="submit" class="btn-enviar">
                    Generar Cotizacion vía WhatsApp
                </button>
            </form>
        </div>

        <footer>
            © 2026 CORTEX ANUNCIOS - Los Mochis, Sinaloa.
        </footer>
    </div>

    <script>
        document.getElementById('cotizador-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // Recopilar datos
            const nombre = document.getElementById('nombre').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const tipo = document.getElementById('tipo').value;
            const medidas = document.getElementById('medidas').value || "No especificadas";
            const instalacion = document.getElementById('instalacion').value;
            const superficie = document.getElementById('superficie').value;
            const desc = document.getElementById('descripcion').value || "Sin detalles adicionales";

            // Número de la empresa
            const telCortex = "526681490233";

            // Formatear mensaje para WhatsApp
            const mensaje = `*NUEVA SOLICITUD DE COTIZACIÓN* %0A%0A` +
                            `👤 *Cliente:* ${nombre}%0A` +
                            `📱 *Tel:* ${whatsapp}%0A%0A` +
                            `📍 *Producto:* ${tipo}%0A` +
                            `📏 *Medidas:* ${medidas}%0A` +
                            `🛠️ *Instalación:* ${instalacion}%0A` +
                            `🧱 *Superficie:* ${superficie}%0A%0A` +
                            `📝 *Detalles:* ${desc}`;

            const url = `https://wa.me/${telCortex}?text=${mensaje}`;
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
